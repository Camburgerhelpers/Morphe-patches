name: Build Morphe patches

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to build
        required: true
        default: Camburgerhelpers-patch-1

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Allow Gradle wrapper to run
        run: chmod +x gradlew

      - name: Build patches and patch list
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :patches:generatePatchesList --stacktrace

      - name: Show generated files
        if: always()
        run: |
          echo "Generated files:"
          find patches/build -type f 2>/dev/null | sort || true
          echo "Root patch list:"
          ls -l patches-list.json 2>/dev/null || true

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: aliexpress-morphe-patches
          if-no-files-found: error
          path: |
            patches/build/**
            patches-list.json
